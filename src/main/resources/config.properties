# Default configuration for API tests
# You can override with: mvn clean verify -DbaseUrl=https://your.api
# or set environment variable BASE_URL

baseUrl=https://petstore.swagger.io/v2

# Timeouts (ms)
connectTimeout=10000
socketTimeout=20000
connectionRequestTimeout=10000

# Default headers
accept=application/json
contentType=application/json

# Logging
logRequests=true
logResponses=true
